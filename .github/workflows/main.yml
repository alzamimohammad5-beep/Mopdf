name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        # تحديد إصدار Cython لتجنب مشاكل الترجمة الخفية
        pip install --upgrade buildozer Cython==0.29.33 virtualenv

    - name: Run Buildozer to create APK
      run: |
        buildozer init
        # إضافة المكتبات
        sed -i 's/requirements = python3,kivy/requirements = python3,kivy,pillow,plyer/g' buildozer.spec
        # إضافة الصلاحيات
        sed -i 's/# android.permissions = INTERNET/android.permissions = INTERNET,READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE/g' buildozer.spec
        # الموافقة على التراخيص بطريقة آمنة
        echo "android.accept_sdk_license = True" >> buildozer.spec
        # بناء التطبيق
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Image-To-Pdf-App
        path: bin/*.apk
        
