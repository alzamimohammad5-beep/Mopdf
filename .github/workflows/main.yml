name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt update
        # هنا أضفنا مكتبات الصور الأساسية لحل مشكلة الـ 8 دقائق
        sudo apt install -y build-essential git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev libjpeg-dev libltdl-dev
        pip install --upgrade pip
        pip install buildozer cython==0.29.33 virtualenv wheel

    - name: Initialize and Configure Buildozer perfectly
      run: |
        yes | buildozer init
        # هذا سكربت بايثون جراحي لتعديل الملف بدون أي أخطاء أو تشوه
        cat << 'EOF' > setup_spec.py
        import re
        with open('buildozer.spec', 'r') as f:
            data = f.read()
        
        data = re.sub(r'^requirements =.*', 'requirements = python3,kivy,pillow,plyer', data, flags=re.MULTILINE)
        data = re.sub(r'^#? *android\.permissions =.*', 'android.permissions = INTERNET,READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE', data, flags=re.MULTILINE)
        data = re.sub(r'^#? *android\.accept_sdk_license =.*', 'android.accept_sdk_license = True', data, flags=re.MULTILINE)
        
        with open('buildozer.spec', 'w') as f:
            f.write(data)
        EOF
        python3 setup_spec.py

    - name: Build APK (with verbose logging)
      run: yes | buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Image-To-Pdf-App
        path: bin/*.apk
        
