name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip install --upgrade buildozer cython virtualenv

    - name: Configure and Build APK
      run: |
        buildozer init
        # 1. إضافة المكتبات (pillow للصور، plyer للملفات)
        sed -i 's/requirements = python3,kivy/requirements = python3,kivy,pillow,plyer/g' buildozer.spec
        
        # 2. تفعيل الصلاحيات (الدخول لملفات الهاتف)
        sed -i 's/.*android.permissions = .*/android.permissions = INTERNET,READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE/g' buildozer.spec
        
        # 3. الموافقة الإجبارية على تراخيص جوجل (الحل الجذري للمشكلة)
        sed -i 's/.*android.accept_sdk_license = .*/android.accept_sdk_license = True/g' buildozer.spec
        
        # 4. بدء البناء
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Image-To-Pdf-App
        path: bin/*.apk
        
