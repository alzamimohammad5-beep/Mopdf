name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip install --upgrade buildozer cython virtualenv

    - name: Create Perfect Buildozer Spec
      run: |
        cat <<EOF > buildozer.spec
        [app]
        title = ImageToPdf
        package.name = img2pdf
        package.domain = org.mohammad
        source.dir = .
        source.include_exts = py,png,jpg,jpeg
        version = 1.0
        requirements = python3,kivy,pillow,plyer
        orientation = portrait
        fullscreen = 0
        android.permissions = INTERNET, READ_EXTERNAL_STORAGE, WRITE_EXTERNAL_STORAGE
        android.accept_sdk_license = True
        android.api = 33
        android.minapi = 21
        
        [buildozer]
        log_level = 2
        warn_on_root = 1
        EOF

    - name: Build APK
      run: buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Image-To-Pdf-App
        path: bin/*.apk
        
